# acme.sh — 自動化 SSL/TLS 證書申請與續期工具
# 使用 ACME 協議（Let's Encrypt / ZeroSSL）自動簽發和管理證書。
#
# ⚠️ 使用前請先配置 .env 文件，填入你的 DNS API 憑證。
#    可參考 .env.example 文件。

# 1. 设置默认 CA 为 Let's Encrypt
# docker exec acme-sh --set-default-ca --server letsencrypt

# 2. 申请证书 (dns_cf 代表使用 Cloudflare 插件)
# docker exec acme-sh --issue --dns dns_cf -d yourdomain.com -d *.yourdomain.com

# 3. 證書導出和自動續簽關聯
# docker exec acme-sh --install-cert -d mc-kyler.com --ecc \
# --key-file       /certs/mc-kyler.key  \
# --fullchain-file /certs/mc-kyler.crt
services:
  acme.sh:
    image: neilpang/acme.sh
    container_name: acme-sh
    restart: always
    env_file:
      - .env
    volumes:
      - ./acme.sh:/acme.sh
      # 映射一個目錄用來存放生成的證書，方便其他服務（如 Jellyfin、Nginx）讀取
      - ./certs:/certs
    command: daemon
